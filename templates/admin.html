<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router Management Interface</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #ecf0f1; padding: 40px; border-radius: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 24px; color: #2c3e50; }
        .header span { font-size: 14px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #34495e; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 3px; box-sizing: border-box; background-color: #fff; }
        button { width: 100%; background: #e74c3c; color: #fff; border: none; padding: 12px; border-radius: 3px; font-size: 16px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="header">
            <h1>{{SSID_NAME}}</h1>
            <span>Gateway Administration</span>
        </div>
        <form action="/login" method="GET">
            <div class="input-group">
                <label for="admin_user">Benutzername</label>
                <input type="text" id="admin_user" name="admin_user" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="admin_pass">Passwort</label>
                <input type="password" id="admin_pass" name="admin_pass" required>
            </div>
            <button type="submit">Anmelden</button>
        </form>
    </div>
</body>
</html>
